<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College LMS | Forgot Password</title>
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">
    <style>
        #message {
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Floating Animated Background Particles -->
    <div class="particle particle-1" aria-hidden="true"></div>
    <div class="particle particle-2" aria-hidden="true"></div>
    <div class="particle particle-3" aria-hidden="true"></div>
    <div class="particle particle-4" aria-hidden="true"></div>

    <!-- MAIN CONTENT AREA -->
    <main class="content-area" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">

        <!-- FORGOT PASSWORD SECTION -->
        <section class="login-card" aria-labelledby="form-title">
            <h2 id="form-title">Reset Password 🔒</h2>
            <p class="subtitle">Enter your email and new password</p>

            <form id="forgotPasswordForm" novalidate>

                <!-- Email Input Field -->
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="student@college.edu" required aria-required="true">
                </div>

                <!-- New Password Field -->
                <div class="input-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required aria-required="true">
                </div>

                <p id="message"></p>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn primary-btn">Reset Password</button>
                </div>
                
                <div style="text-align: center; margin-top: 15px;">
                    <a href="index.html" class="forgot-link">Back to Login</a>
                </div>
            </form>
        </section>

    </main>

    <!-- Link to the external JavaScript file -->
    <script src="forgot-password.js"></script>
</body>

</html>
